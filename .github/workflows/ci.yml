name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Build, Test, Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true

      - name: Install LibRaw
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libraw-dev pkg-config

      - name: Show tool versions
        run: |
          go version
          pkg-config --modversion libraw

      - name: Check LibRaw linkage
        run: make libraw-check

      - name: Build
        run: make build

      - name: Vet
        run: make vet

      - name: Test
        run: make test

      - name: Coverage
        run: make cover

      - name: Upload coverage profile
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          if-no-files-found: error
